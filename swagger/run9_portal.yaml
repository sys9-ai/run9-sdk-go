info:
  contact:
    email: h@pingcap.com
    name: run9
    url: https://run.sys9.ai
  description: |-
    The public portal-api HTTP surface for run9.
    JSON request bodies reject unknown fields and errors are returned as {"error":"..."}.
  license:
    name: Proprietary
  title: run9 API
  version: 1.0.0
